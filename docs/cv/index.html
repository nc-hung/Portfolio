function render(d) {
  const li = arr => `<ul>${arr.map(b => `<li>${b}</li>`).join('')}</ul>`;
  const strengths = d.strengths.map(s => `<div class="item"><b>${s.label}</b> ${s.text}</div>`).join('');
  const exp = d.experience.map(e => e.role
    ? `<div class="role-meta"><h3>${e.role}</h3><span class="where">${e.meta}</span></div>${li(e.bullets)}`
    : `<div class="proj">${e.proj}</div>${li(e.bullets)}`
  ).join('');
  const projects = d.projects.map(p => `<h3>${p.title}</h3>${li(p.bullets)}`).join('');
  const skills = d.skills.map(s => `<div><b>${s.label}</b> ${s.value}</div>`).join('');
  const edu = d.education.map(e => `<div><b>${e.inst}</b> - ${e.detail}</div>`).join('');
  return `
    <h1>${d.name}</h1>
    <div class="subtitle">${d.subtitle}</div>
    <div class="contact">${d.contact}</div>
    <h2>${d.summaryTitle}</h2>
    <p class="summary">${d.summary}</p>
    <h2>${d.strengthsTitle}</h2>
    <div class="grid2">${strengths}</div>
    <h2>${d.expTitle}</h2>
    ${exp}
    <h2>${d.addlTitle}</h2>
    ${projects}
    <h2>${d.achTitle}</h2>
    ${li(d.achievements)}
    <h2>${d.skillsTitle}</h2>
    <div class="skills">${skills}</div>
    <h2>${d.eduTitle}</h2>
    <div class="edu">${edu}</div>
  `;
}

let lang = (() => { try { return (localStorage.getItem('lang') === 'en') ? 'en' : 'vi'; } catch (e) { return 'vi'; } })();

function apply() {
  const d = CV[lang];
  document.documentElement.lang = lang;
  document.getElementById('sheet').innerHTML = render(d);
  document.getElementById('pb-print').textContent = d.ui.print;
  document.getElementById('pb-hint').textContent = d.ui.hint;
  document.getElementById('btn-vi').classList.toggle('active', lang === 'vi');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
}

function setLang(l) {
  lang = l;
  try { localStorage.setItem('lang', l); } catch (e) {}
  apply();
}

apply();
</script>
