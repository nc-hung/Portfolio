                            method: 'POST',
                            headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                            body: JSON.stringify(form)

                        setStatus(res.ok ? 'sent' : 'error');

                                        <div className="w-12 h-12 bg-emerald-500/10 rounded-full flex items-center justify-center text-emerald-400 mb-4"><LucideIcon name="shield" /></div>

                                        <p className="text-slate-400 text-xs font-medium">{a.giver}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Skills */}
                    <section id="skills" className="py-24 px-6 lg:px-12 bg-brand-600/5">
                        <div className="container mx-auto max-w-6xl">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
                                <div>
                                    <h2 className="text-5xl font-black font-display text-white tracking-tighter mb-8 leading-[1.1]">{t.skills.heading}</h2>
                                    <p className="text-slate-400 text-sm leading-relaxed mb-10 font-medium">{t.skills.sub}</p>
                                    <div className="space-y-6">
                                        {t.skills.bars.map((sk, i) => (
                                            <div key={i} className="space-y-2">
                                                <div className="flex justify-between text-xs font-bold uppercase tracking-widest">
                                                    <span className="text-slate-200">{sk.name}</span>
                                                    <span className="text-brand-400">{sk.val}%</span>
                                                </div>
                                                <div className="h-1 w-full bg-surface-600 rounded-full overflow-hidden">
                                                    <div className="h-full bg-brand-500 rounded-full" style={{ width: `${sk.val}%` }}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {t.skills.cards.map((sk, i) => (
                                        <div key={i} className="glass-card p-6 rounded-2xl border-white/5 group hover:bg-brand-600/10 transition-colors">
                                            <div className="w-10 h-10 bg-brand-500/10 rounded-xl flex items-center justify-center text-brand-400 mb-4 group-hover:scale-110 transition-transform"><LucideIcon name={sk.icon} /></div>
                                            <h4 className="text-white font-bold text-sm mb-1">{sk.n}</h4>
                                            <p className="text-slate-500 text-[10px] font-medium leading-relaxed">{sk.d}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Contact */}
                    <section id="contact" className="py-24 px-6 lg:px-12 bg-surface-800/30">
                        <div className="container mx-auto max-w-4xl">
                            <div className="text-center mb-12">
                                <span className="text-brand-500 text-[10px] font-black uppercase tracking-[0.3em] mb-4 block">{t.contact.eyebrow}</span>
                                <h2 className="text-5xl md:text-6xl font-black font-display text-white tracking-tighter mb-4">{t.contact.heading}</h2>
                                <p className="text-slate-400 text-sm max-w-xl mx-auto leading-relaxed font-medium">{t.contact.sub}</p>
                            </div>
                            {CONTACT.calendly && (
                                <div className="text-center mb-8">
                                    <a href={CONTACT.calendly} target="_blank" className="inline-flex items-center gap-3 bg-white text-black font-black py-4 px-8 rounded-2xl hover:bg-slate-200 transition-all text-sm shadow-xl shadow-white/5">
                                        {t.contact.book}<LucideIcon name="zap" className="w-4 h-4" />
                                    </a>
                                    <p className="text-slate-500 text-xs font-medium uppercase tracking-widest mt-4">{t.contact.or}</p>
                                </div>
                            )}
                            <ContactForm t={t} />
                            <div className="flex flex-wrap justify-center gap-6 mt-8 text-sm">
                                <a href={`mailto:${CONTACT.email}`} className="text-slate-400 hover:text-brand-400 transition-colors font-medium">{CONTACT.email}</a>
                                <a href={CONTACT.phoneHref} className="text-slate-400 hover:text-brand-400 transition-colors font-medium">{CONTACT.phone}</a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-20 px-6 lg:px-12 border-t border-white/5">
                        <div className="container mx-auto max-w-6xl">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-10">
                                <div>
                                    <h3 className="text-4xl font-black font-display text-white tracking-tighter mb-2">{t.footer.cta}</h3>
                                    <p className="text-slate-500 text-xs font-medium uppercase tracking-widest">{t.footer.availability}</p>
                                </div>
                                <div className="flex flex-wrap gap-4">
                                    <a href="mailto:business.nc.hung@gmail.com" className="bg-white text-black font-black px-8 py-4 rounded-2xl hover:bg-slate-200 transition-all text-sm shadow-xl shadow-white/5">business.nc.hung@gmail.com</a>
                                    <a href="tel:0981815237" className="glass-card text-white font-black px-8 py-4 rounded-2xl border-white/10 hover:bg-white/5 transition-all text-sm">+84 981 815 237</a>
                                </div>
                            </div>
                            <div className="mt-20 pt-10 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">
                                <p>&copy; 2025 {t.footer.rights}</p>
                                <div className="flex gap-8">
                                    <a href="https://github.com/nc-hung" target="_blank" className="hover:text-white transition-colors">GitHub</a>
                                    <a href="assets/cv.pdf" target="_blank" className="hover:text-white transition-colors">{t.footer.resume}</a>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
