                    } catch (err) { setStatus('error'); }
                } else {
                    const subject = encodeURIComponent(`[Du an] ${form.name || 'Lien he tu website'}`);
                    const body = encodeURIComponent(`${form.message}\n\n${form.name} (${form.email})`);
                    window.location.href = `mailto:${CONTACT.email}?subject=${subject}&body=${body}`;
                    setStatus('sent');
                }
            };
            const field = "w-full bg-zinc-900 border border-white/10 rounded-xl px-4 py-3 text-sm text-zinc-100 placeholder-zinc-500 focus:border-accent-500 focus:outline-none focus:ring-1 focus:ring-accent-500 transition-colors";
            if (status === 'sent') return (
                <div className="panel rounded-xl p-8 text-center" style={{ borderColor: 'rgba(52,211,153,0.3)' }}>
                    <Icon name="check-circle" className="text-accent-400 text-3xl" />
                    <p className="text-zinc-100 font-medium mt-3">{t.contact.sent}</p>
                </div>
            );
            return (
                <form onSubmit={submit} className="panel rounded-xl p-6 sm:p-8 space-y-4">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div className="flex flex-col gap-1.5">
                            <label className="text-xs font-medium text-zinc-400">{t.contact.name}</label>
                            <input required value={form.name} onChange={upd('name')} className={field} />
                        </div>
                        <div className="flex flex-col gap-1.5">
                            <label className="text-xs font-medium text-zinc-400">{t.contact.emailField}</label>
                            <input required type="email" value={form.email} onChange={upd('email')} className={field} />
                        </div>
                    </div>
                    <div className="flex flex-col gap-1.5">
                        <label className="text-xs font-medium text-zinc-400">{t.contact.project}</label>
                        <textarea required value={form.message} onChange={upd('message')} rows="4" className={`${field} resize-none`}></textarea>
                    </div>
                    {status === 'error' && <p className="text-red-400 text-xs">{t.contact.error}</p>}
                    <button type="submit" disabled={status === 'sending'} className="press w-full bg-accent-500 hover:bg-accent-400 disabled:opacity-60 text-zinc-950 font-semibold py-3.5 px-6 rounded-full transition-colors flex items-center justify-center gap-2 text-sm">
                        {status === 'sending' ? t.contact.sending : t.contact.send}<Icon name="paper-plane-tilt" />
                    </button>
                </form>
            );
        };

        const ProjectCard = ({ p, t, featured }) => {
            const [open, setOpen] = useState(false);
            useEffect(() => { if (open) mermaid.init(undefined, `.mermaid-${p.id}`); }, [open]);
            return (
                <div className={`panel lift rounded-xl p-7 flex flex-col ${featured ? 'md:col-span-2' : ''}`}>
                    <div className="flex items-center justify-between gap-3 mb-4">
                        <span className="font-mono text-[11px] uppercase tracking-wider text-accent-400">{p.type}</span>
                        {featured && <span className="text-[10px] font-semibold uppercase tracking-wider text-zinc-950 bg-accent-400 px-2 py-0.5 rounded-full">{t.work.featuredTag}</span>}
                    </div>
                    <h3 className={`font-display font-bold text-white mb-3 ${featured ? 'text-3xl' : 'text-2xl'}`}>{p.title}</h3>
                    <p className="text-zinc-400 text-sm leading-relaxed mb-5 max-w-[60ch]">{p.desc}</p>
                    <ul className="space-y-2 mb-6">
                        {p.details.map((d, i) => (
                            <li key={i} className="flex items-start gap-2.5 text-xs text-zinc-300">
                                <Icon name="check-circle" className="text-accent-500 mt-0.5 shrink-0" /><span>{d}</span>
                            </li>
                        ))}
                    </ul>
                    <div className="flex flex-wrap gap-2 mb-5 mt-auto">
                        {p.tech.map((tc, i) => <span key={i} className="font-mono text-[10px] text-zinc-400 bg-white/5 border border-white/5 px-2 py-1 rounded">{tc}</span>)}
                    </div>
                    <button onClick={() => setOpen(!open)} className="press self-start inline-flex items-center gap-2 text-xs font-medium text-zinc-300 hover:text-accent-400 transition-colors">
                        <Icon name="tree-structure" />{open ? t.work.hideArch : t.work.showArch}
                    </button>
                    {open && <div className={`mermaid mermaid-${p.id}`}>{p.architecture}</div>}
                </div>
            );
        };

        const Reveal = ({ children, className = "", as = "div" }) => {
            const ref = useRef(null);
            useEffect(() => {
                const el = ref.current; if (!el) return;
                const io = new IntersectionObserver((entries) => {
                    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-in'); io.unobserve(e.target); } });
                }, { threshold: 0.15 });
                io.observe(el);
                return () => io.disconnect();
            }, []);
            const Tag = as;
            return <Tag ref={ref} className={`reveal ${className}`}>{children}</Tag>;
        };

        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            const [lang, setLang] = useState(() => { try { return localStorage.getItem('lang') || 'vi'; } catch (e) { return 'vi'; } });
            const t = STR[lang];

            // Nav background toggle via IntersectionObserver sentinel (no scroll listener; see skill 5.D)
            const sentinelRef = useRef(null);
            useEffect(() => {
                const el = sentinelRef.current; if (!el) return;
                const io = new IntersectionObserver(([e]) => setScrolled(!e.isIntersecting), { threshold: 1 });
                io.observe(el);
                return () => io.disconnect();
            }, []);
            useEffect(() => { try { localStorage.setItem('lang', lang); } catch (e) {} document.documentElement.lang = lang; }, [lang]);

            const projects = PROJECT_ORDER.map(id => ({ id, ...PROJECT_META[id], ...t.projects[id] }));

            return (
                <div className="min-h-screen relative">
                    <div ref={sentinelRef} className="absolute top-0 left-0 h-4 w-px pointer-events-none"></div>
                    {/* Background: subtle off-black field, single accent glow kept very low */}
                    <div className="fixed inset-0 z-[-1] pointer-events-none" style={{ background: 'radial-gradient(60% 50% at 75% 0%, rgba(16,185,129,0.06), transparent 70%)' }}></div>

                    {/* Nav (single line, <=72px) */}
                    <nav className={`fixed top-0 inset-x-0 z-50 transition-all duration-300 ${scrolled ? 'panel backdrop-blur-md h-14' : 'h-[72px]'} flex items-center`}>
                        <div className="container mx-auto max-w-6xl px-5 lg:px-8 flex items-center justify-between">
                            <a href="#top" className="flex items-center gap-2.5">
                                <span className="w-8 h-8 rounded-lg bg-accent-500 text-zinc-950 font-display font-extrabold flex items-center justify-center">H</span>
                                <span className="font-display font-bold tracking-tight text-white">Cong Hung</span>
                            </a>
                            <div className="flex items-center gap-5 lg:gap-8">
                                <div className="hidden md:flex items-center gap-7 text-sm text-zinc-400 font-medium">
                                    <a href="#services" className="hover:text-white transition-colors">{t.nav.services}</a>
                                    <a href="#process" className="hover:text-white transition-colors">{t.nav.process}</a>
                                    <a href="#work" className="hover:text-white transition-colors">{t.nav.work}</a>
                                </div>
                                <div className="flex items-center gap-1 text-xs font-semibold">
                                    <button onClick={() => setLang('vi')} className={`px-1.5 py-1 transition-colors ${lang === 'vi' ? 'text-accent-400' : 'text-zinc-500 hover:text-zinc-300'}`}>VI</button>
                                    <span className="text-zinc-700">/</span>
                                    <button onClick={() => setLang('en')} className={`px-1.5 py-1 transition-colors ${lang === 'en' ? 'text-accent-400' : 'text-zinc-500 hover:text-zinc-300'}`}>EN</button>
                                </div>
                                <a href="#contact" className="press hidden sm:inline-flex items-center gap-1.5 bg-white text-zinc-950 hover:bg-accent-400 transition-colors text-sm font-semibold px-4 py-2 rounded-full">{t.nav.contact}</a>
                            </div>
                        </div>
                    </nav>

                    <main id="top">
                        {/* Hero: asymmetric split, type-led left, identity card right */}
                        <section className="px-5 lg:px-8 pt-28 md:pt-32 pb-16">
                            <div className="container mx-auto max-w-6xl grid lg:grid-cols-[1.4fr_1fr] gap-12 lg:gap-16 items-center">
                                <div>
                                    <div className="inline-flex items-center gap-2 mb-7 text-xs font-medium text-accent-300">
                                        <span className="avail-dot w-2 h-2 rounded-full bg-accent-400"></span>{t.hero.avail}
                                    </div>
                                    <h1 className="font-display font-extrabold text-white tracking-tight leading-[0.98] text-5xl md:text-6xl lg:text-7xl">
                                        {t.hero.h1}<br /><span className="text-accent-400">{t.hero.h2}</span>
                                    </h1>
                                    <p className="text-zinc-400 text-lg leading-relaxed mt-7 max-w-[48ch]">{t.hero.sub}</p>
                                    <div className="flex flex-wrap items-center gap-3 mt-9">
                                        <a href="#contact" className="press inline-flex items-center gap-2 bg-accent-500 hover:bg-accent-400 text-zinc-950 font-semibold text-sm px-6 py-3.5 rounded-full transition-colors">
                                            {t.hero.ctaPrimary}<Icon name="arrow-right" />
                                        </a>
                                        <a href="#work" className="press inline-flex items-center gap-2 border border-white/15 hover:border-white/30 hover:bg-white/5 text-zinc-100 font-semibold text-sm px-6 py-3.5 rounded-full transition-colors">{t.hero.ctaSecondary}</a>
                                    </div>
                                </div>
                                {/* Identity object (real content presented as the hero visual) */}
                                <div className="panel rounded-2xl p-7 lg:p-8 relative overflow-hidden">
                                    {/* TODO (optional upgrade): drop a real portrait or a Check Toa product screenshot here for extra impact. */}
                                    <div className="flex items-center justify-between mb-8">
                                        <span className="w-12 h-12 rounded-xl bg-accent-500 text-zinc-950 font-display font-extrabold text-xl flex items-center justify-center">H</span>
                                        <Icon name="scales" className="text-accent-400/40 text-4xl" />
                                    </div>
                                    <p className="font-display font-bold text-2xl text-white">Nguyen Cong Hung</p>
                                    <p className="text-accent-400 text-sm font-medium mt-1">{t.hero.cardRole}</p>
                                    <p className="text-zinc-500 text-sm mt-1">{t.hero.cardLoc}</p>
                                    <div className="h-px bg-white/8 my-6"></div>
                                    <div className="grid grid-cols-2 gap-5">
                                        <div><p className="font-mono text-3xl font-medium text-white">5+</p><p className="text-zinc-500 text-xs mt-1">{t.trust.years}</p></div>
                                        <div><p className="font-mono text-3xl font-medium text-white">20+</p><p className="text-zinc-500 text-xs mt-1">{t.trust.projects}</p></div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Services: divided list (distinct layout family) */}
                        <section id="services" className="px-5 lg:px-8 py-20 border-t border-white/5">
                            <div className="container mx-auto max-w-6xl">
                                <Reveal as="h2" className="font-display font-bold text-white tracking-tight text-3xl md:text-5xl mb-12">{t.services.h}</Reveal>
                                <div className="divide-y divide-white/8">
                                    {t.services.items.map((it, i) => (
                                        <Reveal key={i} className="grid md:grid-cols-[auto_1fr_1.4fr] gap-4 md:gap-8 items-start py-7 group">
                                            <span className="w-11 h-11 rounded-xl bg-accent-500/10 text-accent-400 flex items-center justify-center text-xl shrink-0"><Icon name={it.icon} /></span>
                                            <h3 className="font-display font-semibold text-white text-xl">{it.title}</h3>
                                            <p className="text-zinc-400 text-sm leading-relaxed max-w-[55ch]">{it.desc}</p>
                                        </Reveal>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Process: 4-step flow (distinct family) */}
                        <section id="process" className="px-5 lg:px-8 py-20 border-t border-white/5">
                            <div className="container mx-auto max-w-6xl">
                                <Reveal className="max-w-2xl mb-12">
                                    <h2 className="font-display font-bold text-white tracking-tight text-3xl md:text-5xl">{t.process.h}</h2>
                                    <p className="text-zinc-400 mt-3">{t.process.sub}</p>
                                </Reveal>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                                    {t.process.steps.map((s, i) => (
                                        <Reveal key={i} className="panel lift rounded-xl p-6" >
                                            <div className="flex items-center justify-between mb-5">
                                                <span className="w-10 h-10 rounded-lg bg-zinc-900 text-accent-400 flex items-center justify-center text-lg"><Icon name={s.icon} /></span>
                                                <span className="font-mono text-xs text-zinc-600">0{i + 1}</span>
                                            </div>
                                            <h3 className="font-display font-semibold text-white">{s.title}</h3>
                                            <p className="text-zinc-400 text-sm leading-relaxed mt-2">{s.desc}</p>
                                        </Reveal>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Work: card grid with featured span (distinct family) */}
                        <section id="work" className="px-5 lg:px-8 py-20 border-t border-white/5">
                            <div className="container mx-auto max-w-6xl">
                                <Reveal as="h2" className="font-display font-bold text-white tracking-tight text-3xl md:text-5xl mb-12">{t.work.h}</Reveal>
                                <div className="grid md:grid-cols-2 gap-5">
                                    {projects.map(p => <Reveal key={p.id} className={p.featured ? 'md:col-span-2' : ''}><ProjectCard p={p} t={t} featured={p.featured} /></Reveal>)}
                                </div>
                            </div>
                        </section>

                        {/* Experience: compact timeline (distinct family) */}
                        <section className="px-5 lg:px-8 py-20 border-t border-white/5">
                            <div className="container mx-auto max-w-6xl grid lg:grid-cols-[1fr_1.6fr] gap-12">
                                <Reveal>
                                    <h2 className="font-display font-bold text-white tracking-tight text-3xl md:text-5xl">{t.exp.h}</h2>
                                    <p className="text-zinc-500 text-sm mt-5 flex items-start gap-2 max-w-xs"><Icon name="star" className="text-accent-400 mt-0.5" />{t.exp.awards}</p>
                                </Reveal>
                                <div>
                                    {t.otherProjects.map((op, i) => (
                                        <Reveal key={i} className="flex gap-5 py-5 border-b border-white/8 last:border-0">
                                            <span className="font-mono text-xs text-zinc-500 w-24 shrink-0 pt-1">{op.period}</span>
                                            <div>
                                                <h3 className="font-display font-semibold text-white">{op.title}</h3>
                                                <p className="text-accent-400 text-xs font-medium mt-0.5">{op.role} · {op.company}</p>
                                                <p className="text-zinc-400 text-sm leading-relaxed mt-2 max-w-[55ch]">{op.desc}</p>
                                            </div>
                                        </Reveal>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Skills: bars + tech pills (distinct family) */}
                        <section className="px-5 lg:px-8 py-20 border-t border-white/5">
                            <div className="container mx-auto max-w-6xl grid lg:grid-cols-2 gap-12 lg:gap-20 items-center">
                                <Reveal>
                                    <h2 className="font-display font-bold text-white tracking-tight text-3xl md:text-5xl mb-9">{t.skills.h}</h2>
                                    <div className="space-y-5">
                                        {t.skills.bars.map((s, i) => (
                                            <div key={i}>
                                                <div className="flex justify-between text-sm mb-2"><span className="text-zinc-200 font-medium">{s.name}</span><span className="font-mono text-accent-400 text-xs">{s.val}</span></div>
                                                <div className="h-1.5 w-full bg-zinc-800 rounded-full overflow-hidden"><div className="h-full bg-accent-500 rounded-full" style={{ width: `${s.val}%` }}></div></div>
                                            </div>
                                        ))}
                                    </div>
                                </Reveal>
                                <Reveal className="flex flex-wrap gap-2.5 content-start">
                                    {t.skills.groups.map((g, i) => <span key={i} className="font-mono text-sm text-zinc-300 panel px-3.5 py-2 rounded-lg">{g}</span>)}
                                </Reveal>
                            </div>
                        </section>

                        {/* Contact: centered form (distinct family) */}
                        <section id="contact" className="px-5 lg:px-8 py-20 border-t border-white/5">
                            <div className="container mx-auto max-w-2xl">
                                <Reveal className="text-center mb-10">
                                    <h2 className="font-display font-bold text-white tracking-tight text-3xl md:text-5xl">{t.contact.h}</h2>
                                    <p className="text-zinc-400 mt-3 max-w-xl mx-auto">{t.contact.sub}</p>
                                </Reveal>
                                {CONTACT.calendly && (
                                    <div className="text-center mb-7">
                                        <a href={CONTACT.calendly} target="_blank" rel="noopener" className="press inline-flex items-center gap-2 bg-white text-zinc-950 hover:bg-accent-400 transition-colors font-semibold text-sm px-6 py-3.5 rounded-full">{t.contact.book}<Icon name="arrow-right" /></a>
                                        <p className="text-zinc-500 text-xs mt-4">{t.contact.or}</p>
                                    </div>
                                )}
                                <ContactForm t={t} />
                                <div className="flex flex-wrap justify-center gap-6 mt-7 text-sm">
                                    <a href={`mailto:${CONTACT.email}`} className="text-zinc-400 hover:text-accent-400 transition-colors inline-flex items-center gap-2"><Icon name="envelope-simple" />{CONTACT.email}</a>
                                    <a href={CONTACT.phoneHref} className="text-zinc-400 hover:text-accent-400 transition-colors inline-flex items-center gap-2"><Icon name="phone" />{CONTACT.phone}</a>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="px-5 lg:px-8 py-12 border-t border-white/5">
                        <div className="container mx-auto max-w-6xl flex flex-col sm:flex-row items-center justify-between gap-5 text-sm">
                            <p className="text-zinc-500">{t.footer.availability}</p>
                            <div className="flex items-center gap-6 text-zinc-400">
                                <a href={CONTACT.github} target="_blank" rel="noopener" className="hover:text-white transition-colors">GitHub</a>
                                <a href="cv/" target="_blank" className="hover:text-white transition-colors">{t.footer.resume}</a>
                                <span className="text-zinc-600 font-mono text-xs">© 2025 {t.footer.rights}</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
